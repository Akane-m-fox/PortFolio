<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aknfox Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
		<video id="heroVideo" autoplay muted playsinline class="hero-video">
			<source src="video.webm" type="video/webm">
			<source src="video.mp4" type="video/mp4">
		</video>

		<img id="endImage" src="end.jpg" class="hero-video" style="display: none; object-fit: cover;">

		<div class="hero-content">
			<h1 class="main-title">PERSPECTIVE & SYNTHESIS</h1>
			<p class="sub-title">パース・CG合成・フルCGアニメーション</p>
		</div>
	</section>
	
	<section class="expertise-section">
    <video autoplay loop muted playsinline class="bg-video">
        <source src="process-bg.webm" type="video/webm">
    </video>

    <div class="content-overlay">
        <h2>Our Expertise</h2>
        
        <div class="column-container">
            
            <div class="column">
                <div class="column-video-box">
                    <video autoplay loop muted playsinline>
                        <source src="perspective.webm" type="video/webm">
                    </video>
                    <div class="text-overlay">
                        <h3>Spatial<br>Perspective</h3>
                        <p>パース・空間設計</p>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="column-video-box">
                    <video autoplay loop muted playsinline>
                        <source src="composite.webm" type="video/webm">
                    </video>
                    <div class="text-overlay">
                        <h3>Visual<br>Synthesis</h3>
                        <p>CG合成・VFX</p>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="column-video-box">
                    <video autoplay loop muted playsinline>
                        <source src="full-cg.webm" type="video/webm">
                    </video>
                    <div class="text-overlay">
                        <h3>Full CG<br>Narrative</h3>
                        <p>フルCGアニメーション</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
	
	
	<script>
    const video = document.getElementById('heroVideo');
    const image = document.getElementById('endImage');

    video.onended = function() {
        video.style.display = 'none'; // 動画を消す
        image.style.display = 'block'; // 画像を出す
    };
</script>

</body>
</html>
