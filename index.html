<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aknfox Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="hero">
        <video id="heroVideo" autoplay muted playsinline loop class="hero-video">
            <source src="video.mp4" type="video/mp4">
            <source src="Video.webm" type="video/webm">
        </video>
        <img id="endImage" src="1701.png" class="hero-video" style="display: block; object-fit: cover; z-index: 1;">
        
        <div class="hero-content">
            <h1 class="main-title">PERSPECTIVE & SYNTHESIS</h1>
            <p class="sub-title">Architecture • Visual Effect • CG Animation</p>
        </div>
    </section>
    
    <section class="expertise-section">
        <div class="column-container">
            <div class="column">
                <div class="column-video-box">
                    <video autoplay loop muted playsinline><source src="perspective.webm" type="video/webm"></video>
                    <div class="text-overlay"><h3>Spatial<br>Perspective</h3><p>パース・空間設計</p></div>
                </div>
            </div>
            <div class="column">
                <div class="column-video-box">
                    <video autoplay loop muted playsinline><source src="composite.webm" type="video/webm"></video>
                    <div class="text-overlay"><h3>Visual<br>Synthesis</h3><p>CG合成・VFX</p></div>
                </div>
            </div>
            <div class="column">
                <div class="column-video-box">
                    <video autoplay loop muted playsinline><source src="full-cg.webm" type="video/webm"></video>
                    <div class="text-overlay"><h3>Full CG<br>Narrative</h3><p>フルCGアニメーション</p></div>
                </div>
            </div>
        </div>
    </section>

    <section id="works" class="content-block">
        <div class="works-split-container">
            <div class="split-left">
                <div class="comparison-slider">
                    <div class="image-after"><img src="https://drive.google.com/thumbnail?id=1Psqi82FzD6G_6z1M-Bq6vX0y9n9ZJv_x&sz=w2000" alt="Final Render"></div>
                    <div class="image-before" id="before-box"><img src="https://drive.google.com/thumbnail?id=1RkQ82FzD6G_6z1M-Bq6vX0y9n9ZJv_x&sz=w2000" alt="Raw Model"></div>
                    <input type="range" min="0" max="100" value="50" class="slider" id="comparison-slider">
                    <div class="slider-line"></div>
                </div>
            </div>
            <div class="split-right">
                <div class="tech-info">
                    <span class="category-tag">Architectural Visualization</span>
                    <h3>Visual Synthesis & Light</h3>
                    <p>物理法則に基づいた光の挙動を追求し、デジタル空間に圧倒的な実在感を構築します。</p>
                </div>
            </div>
        </div>
    </section>

    <section class="archive-section">
        <div class="section-container">
            <h2 class="section-title">Furniture & Prop Works</h2>
            <div class="archive-container-wrapper">
                <button class="scroll-arrow left" id="arrow-left">❮</button>
                <button class="scroll-arrow right" id="arrow-right">❯</button>
                <div class="horizontal-scroll-wrapper" id="loop-scroll">
                    <div class="scroll-item"><img src="https://drive.google.com/thumbnail?id=1f38xH4plJU3Wy6VRXl6l5ZU1eTp9bHfC&sz=w1000"></div>
                    <div class="scroll-item"><img src="https://drive.google.com/thumbnail?id=1f38xH4plJU3Wy6VRXl6l5ZU1eTp9bHfC&sz=w1000"></div>
                    <div class="scroll-item"><img src="https://drive.google.com/thumbnail?id=1f38xH4plJU3Wy6VRXl6l5ZU1eTp9bHfC&sz=w1000"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="contact-section">
        <div class="section-container">
            <h2 class="section-title">Inquiry Form</h2>
            <div class="form-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfBzYKNTDZu-GB29BNS1w9mReioDlOJLt__ZR_KxLa12RaoSA/viewform?embedded=true" width="100%" height="800" frameborder="0">Loading...</iframe>
            </div>
        </div>
    </section>

    <script>
        window.onload = function() {
            const video = document.getElementById('heroVideo');
            if (video) {
                const playVideo = () => {
                    video.playbackRate = 1.5;
                    video.play().then(() => { video.style.zIndex = "2"; }).catch(e => console.log("Play blocked"));
                };
                video.addEventListener('canplay', playVideo, { once: true });
                if (video.readyState >= 3) playVideo();
                setTimeout(() => { if (video.paused) playVideo(); }, 1000);
            }

            // Slider Logic
            const slider = document.getElementById('comparison-slider');
            const beforeBox = document.getElementById('before-box');
            if (slider && beforeBox) {
                const update = (val) => {
                    beforeBox.style.width = val + '%';
                    document.documentElement.style.setProperty('--exposure-num', val);
                };
                slider.addEventListener('input', (e) => update(e.target.value));
                update(slider.value);
            }

            // Archive Scroll
            const scrollWrapper = document.getElementById('loop-scroll');
            if (scrollWrapper) {
                let isDown = false, startX, scrollLeft;
                scrollWrapper.addEventListener('mousedown', (e) => {
                    isDown = true; startX = e.pageX - scrollWrapper.offsetLeft; scrollLeft = scrollWrapper.scrollLeft;
                });
                const stop = () => { isDown = false; };
                window.addEventListener('mouseup', stop);
                scrollWrapper.addEventListener('mousemove', (e) => {
                    if (!isDown) return; e.preventDefault();
                    const x = e.pageX - scrollWrapper.offsetLeft;
                    scrollWrapper.scrollLeft = scrollLeft - (x - startX) * 2;
                });
            }
        };
    </script>
</body>
</html>
