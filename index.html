<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aknfox Portfolio</title>
    <link rel="preload" href="Video.webm" as="video" type="video/webm">
    <link rel="preload" href="VideoS.webm" as="video" type="video/webm">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="hero">
        <video id="heroVideo" autoplay muted playsinline loop preload="metadata" poster="1701.jpeg" class="hero-video"></video>
        <img id="endImage" src="1701.jpeg" class="hero-video" style="display: block; object-fit: cover; z-index: 1;">
        <div class="hero-content">
            <h1 class="main-title">PERSPECTIVE & SYNTHESIS</h1>
            <p class="sub-title">Architecture • Visual Effect • CG Animation</p>
        </div>
    </section>
    
    <section class="expertise-section">
        <div class="column-container">
            <div class="column"><div class="column-video-box"><video id="exVideo1" autoplay loop muted playsinline></video></div></div>
            <div class="column"><div class="column-video-box"><video id="exVideo2" autoplay loop muted playsinline></video></div></div>
            <div class="column"><div class="column-video-box"><video id="exVideo3" autoplay loop muted playsinline></video></div></div>
        </div>
    </section>

    <section id="works" class="content-block">
        <div class="works-split-container">
            <div class="split-left">
                <div class="comparison-slider">
                    <div class="image-after"><img src="https://drive.google.com/thumbnail?id=1Psqi82FzD6G_6z1M-Bq6vX0y9n9ZJv_x&sz=w2000" alt="Final Render"></div>
                    <div class="image-before" id="before-box"><img src="https://drive.google.com/thumbnail?id=1RkQ82FzD6G_6z1M-Bq6vX0y9n9ZJv_x&sz=w2000" alt="Raw Model"></div>
                    <input type="range" min="0" max="100" value="50" class="slider" id="comparison-slider">
                </div>
            </div>
            <div class="split-right">
                <div class="tech-info">
                    <span class="category-tag">Architectural Visualization</span>
                    <h3>Visual Synthesis & Light</h3>
                    <p>物理法則に基づいた光の挙動を追求し、デジタル空間に圧倒的な実在感を構築します。</p>
                </div>
            </div>
        </div>
    </section>

    <section class="archive-section">
        <div class="section-container">
            <h2 class="section-title">Furniture & Prop Works</h2>
            <div class="archive-container-wrapper">
                <div class="horizontal-scroll-wrapper" id="loop-scroll">
                    <div class="scroll-item"><img src="https://drive.google.com/thumbnail?id=1f38xH4plJU3Wy6VRXl6l5ZU1eTp9bHfC&sz=w1000"></div>
                    <div class="scroll-item"><img src="https://drive.google.com/thumbnail?id=1f38xH4plJU3Wy6VRXl6l5ZU1eTp9bHfC&sz=w1000"></div>
                    <div class="scroll-item"><img src="https://drive.google.com/thumbnail?id=1f38xH4plJU3Wy6VRXl6l5ZU1eTp9bHfC&sz=w1000"></div>
                    </div>
            </div>
        </div>
    </section>

    <script>
        window.onload = function() {
            const isMobile = window.innerWidth <= 768;

            const setupVideo = (id, pcSrc, spSrc) => {
                const v = document.getElementById(id);
                if (!v) return;
                const src = isMobile ? spSrc : pcSrc;
                v.innerHTML = `<source src="${src}" type="video/webm">`;
                v.load();
            };

            setupVideo('heroVideo', 'Video.webm', 'VideoS.webm');
            setupVideo('exVideo1', 'perspective.webm', 'perspectiveS.webm');
            setupVideo('exVideo2', 'composite.webm', 'compositeS.webm');
            setupVideo('exVideo3', 'full-cg.webm', 'full-cgS.webm');

            // Slider
            const slider = document.getElementById('comparison-slider');
            const beforeBox = document.getElementById('before-box');
            if (slider && beforeBox) {
                const update = (val) => {
                    beforeBox.style.width = val + '%';
                    document.documentElement.style.setProperty('--exposure-num', val);
                };
                slider.addEventListener('input', (e) => update(e.target.value));
                update(slider.value);
            }

            // Archive Scroll
            const scrollWrapper = document.getElementById('loop-scroll');
            if (scrollWrapper) {
                let isDown = false, startX, scrollLeft;
                scrollWrapper.onmousedown = (e) => { isDown = true; startX = e.pageX - scrollWrapper.offsetLeft; scrollLeft = scrollWrapper.scrollLeft; };
                window.onmouseup = () => { isDown = false; };
                scrollWrapper.onmousemove = (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - scrollWrapper.offsetLeft; scrollWrapper.scrollLeft = scrollLeft - (x - startX) * 2; };
            }
        };
    </script>
</body>
</html>
